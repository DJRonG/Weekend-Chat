# ui/dashboards/home.yaml
# Home Command — Home view
# Step 4B canonical. Captured live from HA Raw Editor 2026-02-27.
# Section order: Status Tiles > Ambient Graph > Lights > Now Playing > Automation Log > Alerts
# Last updated: 2026-02-27 (Step 4B GitOps capture + normalize pass)
# Source: Home Assistant storage mode dashboard, Home Command dashboard
# Design: grayscale-first. Tile cards for status. History-graph for lux. No media-control cards.

title: Home
path: home
icon: mdi:home
type: sidebar
cards:

  # ── Status Grid ── 4 tiles: person, activity, phone, watch
  - type: horizontal-stack
    cards:
      - type: tile
        entity: person.ron
        name: Ron
        show_entity_picture: false
        icon: mdi:account
        tap_action:
          action: none
      - type: tile
        entity: sensor.cph2655_detected_activity
        name: Activity
        icon: mdi:run
        tap_action:
          action: none
      - type: tile
        entity: sensor.cph2655_battery_level
        name: Phone
        icon: mdi:battery
        tap_action:
          action: none
      - type: tile
        entity: device_tracker.oneplus_watch_2r_0002
        name: Watch
        icon: mdi:watch-export-variant
        tap_action:
          action: none

  # ── Ambient Light ── lux history sparkline (native history-graph, 6h)
  - type: history-graph
    title: Ambient Light (lux)
    hours_to_show: 6
    entities:
      - entity: sensor.smart_presence_sensor_illuminance
        name: Lux

  # ── Lights ── toggle list with master toggle
  - type: entities
    title: Lights
    show_header_toggle: true
    entities:
      - entity: switch.kitchen_lights_led
        name: Kitchen
        icon: mdi:led-strip-variant
      - entity: switch.breakfast_nook_ceiling_lights
        name: Nook Ceiling
        icon: mdi:ceiling-light
      - entity: switch.breakfast_nook_lights
        name: Nook
        icon: mdi:lamp
      - entity: switch.outside_lights
        name: Outside
        icon: mdi:outdoor-lamp
      - entity: switch.loft_fan
        name: Loft Fan
        icon: mdi:fan

  # ── Now Playing ── living room media (entities only, no media-control)
  - type: entities
    title: Now Playing
    entities:
      - entity: media_player.living_room_speakers
        name: Sonos
        icon: mdi:speaker
      - entity: media_player.lg_webos_tv_oled65c4pua_3
        name: LG TV
        icon: mdi:television

  # ── Automation Log ── 24h history of kitchen brightness automations
  # This is the persistent reference log for brightness/lux trigger events
  - type: logbook
    title: Automation Log
    hours_to_show: 24
    entities:
      - automation.kitchen_lighting_auto_on_v1
      - automation.kitchen_lighting_auto_off_v1
      - automation.kitchen_lighting_evening_winddown_v1
      - sensor.smart_presence_sensor_illuminance

  # ── Alerts ── conditional: only show when washer/dryer active
  - type: conditional
    conditions:
      - entity: binary_sensor.washer_power
        state: 'on'
    card:
      type: tile
      entity: binary_sensor.washer_power
      name: Washer Running
      icon: mdi:washing-machine
      color: amber

  - type: conditional
    conditions:
      - entity: binary_sensor.dryer_power
        state: 'on'
    card:
      type: tile
      entity: binary_sensor.dryer_power
      name: Dryer Running
      icon: mdi:tumble-dryer
      color: amber
